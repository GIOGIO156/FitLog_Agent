name: fitlog_local
description: "FitLog Local - offline personal fitness tracker"
publish_to: 'none'
version: 1.0.35+36

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  intl: ^0.20.2
  provider: ^6.1.5
  excel: ^4.0.6
  csv: ^6.0.0
  archive: ^3.6.1
  crypto: ^3.0.6
  shared_preferences: ^2.5.3
  flutter_markdown_plus: ^1.0.7
  flutter_svg: ^2.2.1
  image_picker: ^1.1.2
  image_picker_android: ^0.8.13+17
  image_picker_platform_interface: ^2.11.1
  supabase: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/icons/common/
    - assets/icons/exercises/
    - assets/icons/macros/
    - assets/icons/workouts/
    - assets/branding/
  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-VF.ttf
