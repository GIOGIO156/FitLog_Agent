name: fitlog_local
description: "FitLog Local - offline personal fitness tracker"
publish_to: 'none'
version: 1.0.6+7

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  intl: ^0.20.2
  provider: ^6.1.5
  excel: ^4.0.6
  csv: ^6.0.0
  archive: ^3.6.1
  shared_preferences: ^2.5.3
  flutter_svg: ^2.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/icons/common/
    - assets/icons/exercises/
    - assets/icons/macros/
    - assets/icons/workouts/
  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-VF.ttf
